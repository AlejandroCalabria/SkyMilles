<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Inserir Tabela</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body>

<div th:replace="~{menu :: menu}"></div>

<div class="container mt-5">

    <h1>Inserir Tabela Nutricional</h1>

    <!--
        CORREÇÃO C6: Os nomes dos campos DEVEM corresponder exatamente aos
        @RequestParam do TabelaNutricionalController.salvar():
          - produtoId      (era: produto.proCodigo)
          - unidadeId      (era: unidadeMedida.undCodigo)
          - tabValorEnergeticoPorcao  (novo campo adicionado)
          - tabPorcao
          - tabValorEnergetico

        O binding de objeto (produto.proCodigo) funciona apenas quando o controller
        recebe o objeto inteiro via @ModelAttribute. Como o controller usa @RequestParam,
        os nomes devem ser simples.
    -->
    <form th:action="@{/tabela/salvar}" method="post">

        <div class="mb-3">

            <label class="form-label">Produto *</label>

            <select name="produtoId"
                    class="form-control"
                    required>

                <option value="">Selecione um produto</option>

                <option th:each="p : ${produtos}"
                        th:value="${p.proCodigo}"
                        th:text="${p.proNome}">
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">Unidade de Medida *</label>

            <select name="unidadeId"
                    class="form-control"
                    required>

                <option value="">Selecione</option>

                <option th:each="u : ${unidades}"
                        th:value="${u.undCodigo}"
                        th:text="${u.undNome}">
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">Porção (g ou ml) *</label>

            <input type="number"
                   step="0.01"
                   name="tabPorcao"
                   class="form-control"
                   min="0.1"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">Valor Energético por 100g (kcal)</label>

            <input type="number"
                   step="0.01"
                   name="tabValorEnergetico"
                   class="form-control"
                   value="0">

        </div>

        <div class="mb-3">

            <label class="form-label">Valor Energético por porção (kcal)</label>

            <input type="number"
                   step="0.01"
                   name="tabValorEnergeticoPorcao"
                   class="form-control"
                   value="0">

        </div>

        <div class="mb-3">

            <label class="form-label">Total de Porções na Embalagem</label>

            <input type="number"
                   name="tabTotalPorcao"
                   class="form-control"
                   min="1"
                   max="9999"
                   value="1">

        </div>

        <div class="mb-3">

            <label class="form-label">Colheres por porção (0 = não aplicável)</label>

            <input type="number"
                   step="0.01"
                   name="tabTotalColheres"
                   class="form-control"
                   value="0">

        </div>

        <div class="mb-3">

            <label class="form-label">%VD da Energia</label>

            <input type="number"
                   step="0.01"
                   name="tabVD"
                   class="form-control"
                   value="0">

        </div>

        <div class="alert alert-info" style="font-size:12px;">
            <strong>Dica:</strong> Para calcular automaticamente todos os valores nutricionais
            a partir de ingredientes TACO, use a
            <a th:href="@{/calculadora}">Calculadora Nutricional</a>.
        </div>

        <button type="submit" class="btn btn-success">
            Inserir
        </button>

        <a th:href="@{/tabela}" class="btn btn-secondary">
            Voltar
        </a>

    </form>

</div>

<div th:replace="~{rodape :: rodape}"></div>

</body>
</html>
