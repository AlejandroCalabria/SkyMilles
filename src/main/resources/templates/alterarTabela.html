<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Alterar Tabela</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body>

<div th:replace="~{menu :: menu}"></div>

<div class="container mt-5">

    <h1>Alterar Tabela Nutricional</h1>

    <form th:action="@{/tabela/salvar}" method="post">

        <input type="hidden"
               name="tabCodigo"
               th:value="${tabela.tabCodigo}">

        <div class="mb-3">

            <label>Produto</label>

            <select name="produtoId"
                    class="form-control"
                    required>

                <option th:each="p : ${produtos}"
                        th:value="${p.proCodigo}"
                        th:text="${p.proNome}"
                        th:selected="${p.proCodigo == tabela.produto.proCodigo}">
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label>Valor Energético (kcal/100g)</label>

            <input type="number"
                   step="0.01"
                   name="tabValorEnergetico"
                   class="form-control"
                   th:value="${tabela.tabValorEnergetico}"
                   required>

        </div>

        <div class="mb-3">

            <label>Valor Energético por Porção (kcal)</label>

            <input type="number"
                   step="0.01"
                   name="tabValorEnergeticoPorcao"
                   class="form-control"
                   th:value="${tabela.tabValorEnergeticoPorcao}">

        </div>

        <div class="mb-3">

            <label>Porção</label>

            <input type="number"
                   step="0.01"
                   name="tabPorcao"
                   class="form-control"
                   th:value="${tabela.tabPorcao}"
                   required>

        </div>

        <div class="mb-3">

            <label>Total de Porções na Embalagem</label>

            <input type="number"
                   name="tabTotalPorcao"
                   class="form-control"
                   min="1"
                   max="9999"
                   th:value="${tabela.tabTotalPorcao}">

        </div>

        <div class="mb-3">

            <label>Unidade de Medida</label>

            <select name="unidadeId"
                    class="form-control"
                    required>

                <option th:each="u : ${unidades}"
                        th:value="${u.undCodigo}"
                        th:text="${u.undNome}"
                        th:selected="${u.undCodigo == tabela.unidadeMedida.undCodigo}">
                </option>

            </select>

        </div>

        <div class="mb-3">

            <label>%VD da Energia</label>

            <input type="number"
                   step="0.01"
                   name="tabVD"
                   class="form-control"
                   th:value="${tabela.tabVD}">

        </div>

        <button type="submit" class="btn btn-warning">
            Salvar Alterações
        </button>

        <a th:href="@{/tabela}" class="btn btn-secondary">
            Voltar
        </a>

    </form>

</div>

<div th:replace="~{rodape :: rodape}"></div>

</body>
</html>
