<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nutri - IFTM</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/jquery.mCustomScrollbar.min.css">
    <link rel="stylesheet" href="https://netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.css">
</head>

<body class="main-layout">

<div class="loader_bg">
    <div class="loader"><img src="images/loading.gif" alt="#"></div>
</div>

<!-- MENU (substituir depois por fragmento Thymeleaf) -->

<div class="three_box">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <br><br><br><br>

                <div class="row">
                    <div class="col-md-12">
                        <div class="box_text">
                            <h1>Remover Cooperativas Cadastradas</h1>

                            <form method="POST">
                                <table width="100%">
                                    
                                    <!-- LISTA DE COOPERATIVAS (preencher depois com Thymeleaf) -->
                                    <tr>
                                        <td>1</td>
                                        <td>
                                            <input type="checkbox" name="nuts" value="1">
                                            <label>Cooperativa Exemplo</label>
                                        </td>
                                    </tr>

                                    <tr>
                                        <td colspan="2">
                                            <input type="submit" value="Remover cooperativas cadastradas">
                                        </td>
                                    </tr>

                                    <tr>
                                        <td colspan="5">
                                            <div class="cooperative-actions">
                                                <a href="inserirCooperativa.html" class="btn btn-secondary btn-sm">
                                                    <svg class="icon" viewBox="0 0 24 24">
                                                        <path d="M12 5v14"></path>
                                                        <path d="M5 12h14"></path>
                                                    </svg>
                                                    Nova Cooperativa
                                                </a>

                                                <a href="alterarCooperativa.html" class="btn btn-secondary btn-sm">
                                                    <svg class="icon" viewBox="0 0 24 24">
                                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                                    </svg>
                                                    Editar Cooperativas
                                                </a>

                                                <a href="removerCooperativa.html" class="btn btn-secondary-remove btn-sm">
                                                    <svg class="icon" viewBox="0 0 24 24">
                                                        <polyline points="3,6 5,6 21,6"></polyline>
                                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                                    </svg>
                                                    Remover Cooperativa
                                                </a>
                                            </div>
                                        </td>
                                    </tr>

                                </table>
                            </form>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<footer>
    <div class="testimonial">
        <div class="containerP">
            <div class="row">
                <div class="col-md-12"></div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <div id="myCarousel" class="carousel slide testimonial_Carousel">
                        <div class="carousel-inner">
                            <div class="carousel-item active">
                                <div class="containerP">
                                    <div class="carousel-caption">
                                        <div class="row">
                                            <div class="col-md-15 margin_boot">
                                                <!-- RODAPÉ (fragmento depois) -->
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
</footer>

<script src="js/jquery.min.js"></script>
<script src="js/popper.min.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/jquery-3.0.0.min.js"></script>
<script src="js/jquery.mCustomScrollbar.concat.min.js"></script>
<script src="js/custom.js"></script>

</body>
</html>
