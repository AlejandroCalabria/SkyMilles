<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Inserir Produto</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="main-layout">

<div th:replace="~{menu :: menu}"></div>

<div class="container mt-5">

    <h1>Inserir Produto</h1>

    <form th:action="@{/produtos/salvar}" method="post">

        <div class="mb-3">
            <label>Nome</label>
            <input type="text"
                   name="proNome"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Nome Fantasia</label>
            <input type="text"
                   name="proNomeFantasia"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Fabricante</label>

            <select name="fabricante"
                    class="form-control"
                    required>

                <option value="">
                    Selecione
                </option>

                <option th:each="f : ${fabricantes}"
                        th:value="${f.fabCodigo}"
                        th:text="${f.fabNome}">
                </option>

            </select>
        </div>

        <div class="mb-3">
            <label>Data de Fabricação</label>

            <input type="date"
                   name="proDataFabricacao"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Data de Vencimento</label>

            <input type="date"
                   name="proDataVencimento"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Peso</label>

            <input type="number"
                   step="0.01"
                   name="proPeso"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Ingredientes</label>

            <textarea name="proIngredientes"
                      class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>Recomendações</label>

            <textarea name="proRecomendacoes"
                      class="form-control"></textarea>
        </div>

        <button type="submit"
                class="btn btn-primary">
            Salvar Produto
        </button>

        <a th:href="@{/produtos}"
           class="btn btn-secondary">
            Voltar
        </a>

    </form>

</div>

<footer class="mt-5">
    <div th:replace="~{rodape :: rodape}"></div>
</footer>

</body>
</html>
