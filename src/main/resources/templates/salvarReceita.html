<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${sucesso} ? 'Sucesso - Nutri IFTM' : 'Erro - Nutri IFTM'"></title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="main-layout">

<div class="container" style="margin-top:50px;">
    <div class="box_text">

        <!-- SUCESSO -->
        <div th:if="${sucesso}">
            <h3>Receita salva com sucesso!</h3>

            <p th:text="'Produto: ' + ${produtoNome}"></p>
            <p th:text="'Peso total: ' + ${pesoTotal} + ' ' + ${unidade} + ' | Porção: ' + ${porcao} + ' ' + ${unidade}"></p>
            <p th:text="'Unidade: ' + ${unidade} + ' | Fabricante: ' + ${fabricanteCodigo}"></p>

            <p th:if="${ingredientes != null and !#strings.isEmpty(ingredientes)}">
                <b>Ingredientes:</b>
                <span th:text="${ingredientes}"></span>
            </p>

            <p>
                <b th:text="'Código da Tabela Nutricional: ' + ${tabCodigo}"></b>
            </p>

            <br>
            <a th:href="@{/inserirReceita}" class="btn btn-primary">Nova Receita</a>
            <a th:href="@{/tabela}" class="btn btn-secondary">Ver Tabelas</a>
            <a th:href="@{/}" class="btn btn-secondary">Página Principal</a>
        </div>

        <!-- ERRO -->
        <div th:if="${!sucesso}">
            <h3 th:text="${mensagemErro}"></h3>
            <a th:href="@{/inserirReceita}" class="btn btn-primary">Voltar</a>
        </div>

    </div>
</div>

</body>
</html>
